name: XiaoNaiPing
options:
  bundleIdPrefix: com.mewpow
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
targets:
  XiaoNaiPing:
    type: application
    platform: iOS
    sources:
      - path: XiaoNaiPing
    resources:
      - path: XiaoNaiPing/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mewpow.xiaonaiping
        PRODUCT_NAME: XiaoNaiPing
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: 小奶瓶
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
      configs:
        Debug:
          CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]: "NO"
          CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]: "NO"
          CODE_SIGN_IDENTITY[sdk=iphonesimulator*]: ""
          CODE_SIGNING_ALLOWED[sdk=iphoneos*]: "YES"
          CODE_SIGNING_REQUIRED[sdk=iphoneos*]: "YES"
          CODE_SIGN_IDENTITY[sdk=iphoneos*]: Apple Development
